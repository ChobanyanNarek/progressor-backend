version: "3"
services:
  app:
    env_file:
      - .env
    container_name: pixera_backend
    restart: always
    build: .
    environment:
      DB_HOST: postgres
    ports:
      - "$PORT:$PORT"
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    # Schema requires the PostGIS extension (migration 1778768769174 runs
    # `CREATE EXTENSION postgis` and stores `geography(Point,4326)`); the plain
    # `postgres` image lacks it, so a fresh `up` fails migrations. Use PostGIS.
    image: postgis/postgis:16-3.4
    container_name: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      TZ: 'GMT'
      PGTZ: 'GMT'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres:/data/postgres
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    env_file:
      - .env
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    ports:
      - "8080:80"
    volumes:
      - /data/pgadmin:/root/.pgadmin
    env_file:
      - .env
    links:
      - postgres
volumes:
  postgres:
    driver: local
