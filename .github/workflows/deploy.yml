name: Build and Deploy to Cloud Run for Development

on:
  workflow_dispatch:
  push:
    branches:
      - develop

# Required for keyless auth via Workload Identity Federation.
permissions:
  contents: read
  id-token: write

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      # Authenticate to Google Cloud via Workload Identity Federation (no keys).
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Deploy to the Development environment
        if: github.ref == 'refs/heads/develop'
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          # Artifact Registry Docker repo, e.g. "ghost-app".
          AR_REPOSITORY: ${{ secrets.GCP_AR_REPOSITORY }}
          SERVICE: "ghost-app-dev-api"
          # Runtime service account the Cloud Run service runs as (used by ADC
          # for GCS access). e.g. ghost-app-dev-api@<project>.iam.gserviceaccount.com
          RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"

          # Build and push to Artifact Registry via Cloud Build.
          # Logs stream inline (github-deploy SA has project Viewer), so build
          # errors are visible directly in the Actions output.
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          gcloud builds submit --tag "${IMAGE}" --project "${PROJECT_ID}"

          # Deploy to Cloud Run. The full env config is declared here so the
          # workflow is the single source of truth: --set-secrets maps each
          # Secret Manager secret to the env var the app reads, and
          # --set-env-vars sets the plain (non-secret) values. Both flags
          # REPLACE the existing lists, so every required var must be listed.
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --service-account "${RUNTIME_SERVICE_ACCOUNT}" \
            --platform managed \
            --add-cloudsql-instances "${PROJECT_ID}:${REGION}:ghost-app-dev-db" \
            --set-secrets "DB_DATABASE=DEV_DB_DATABASE:latest,DB_USERNAME=DEV_DB_USERNAME:latest,DB_PASSWORD=DEV_DB_PASSWORD:latest,THROTTLER_TTL=THROTTLER_TTL:latest,THROTTLER_LIMIT=THROTTLER_LIMIT:latest,FALLBACK_LANGUAGE=FALLBACK_LANGUAGE:latest,ENABLE_ORM_LOGS=ENABLE_ORM_LOGS:latest,ENABLE_DOCUMENTATION=ENABLE_DOCUMENTATION:latest,JWT_PRIVATE_KEY=JWT_PRIVATE_KEY:latest,JWT_PUBLIC_KEY=JWT_PUBLIC_KEY:latest,JWT_EXPIRATION_TIME=JWT_EXPIRATION_TIME:latest,GCP_PROJECT_ID=GCP_PROJECT_ID:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest" \
            --set-env-vars "NODE_ENV=production,PORT=3000,DB_HOST=/cloudsql/${PROJECT_ID}:${REGION}:ghost-app-dev-db,DB_PORT=5432" \
            --quiet

      # Push workflow final status to slack (skipped when no webhook is set)
      - uses: act10ns/slack@v1.0.9
        with:
          status: ${{ job.status }}
        if: always() && env.SLACK_WEBHOOK_URL != ''
